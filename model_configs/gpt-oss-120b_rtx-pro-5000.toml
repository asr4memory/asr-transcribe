# Model config for gpt-oss-120b (Q4_K_M)
# Architecture: MoE, 36 transformer layers, 128 experts (4 active), 116.83B params
# File size: ~60 GB across 2 GGUF shards
# VRAM budget: 48 GB (RTX PRO 5000 Blackwell)
#
# Per-layer weight: ~1.62 GB | KV cache: ~2.3 GB (32K) / ~4.5 GB (65K) / ~9.0 GB (131K)
# Trial 3 reduces n_gpu_layers by 4 to make room for the larger KV cache at full context.

[model]
flash_attn = true
n_threads = 8
n_threads_batch = 16

[[profiles]]
n_ctx = 4096
n_gpu_layers = 29
n_batch = 2048
n_ubatch = 1024

[[profiles]]
n_ctx = 8192
n_gpu_layers = 28
n_batch = 4096
n_ubatch = 2048

[[profiles]]
n_ctx = 16384
n_gpu_layers = 27
n_batch = 8192
n_ubatch = 4096

[[profiles]]
n_ctx = 32768
n_gpu_layers = 26
n_batch = 8192
n_ubatch = 4096

[[profiles]]
