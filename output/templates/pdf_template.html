<!DOCTYPE html>
<html lang="{{ lang }}">
  <head>
    <meta charset="utf-8">
    <title>{{filename}}</title>
    <style>
      @font-face {
        font-family: "NotoSans";
        src: url('NotoSans-Regular.ttf');
      }

      @page {
        size: A4 portrait;
        margin: 2.5cm;
        @top-left {
          content: "asr-transcribe " string(doc-title);
          font-style: italic;
          font-size: 10pt;
        }
        @bottom-right {
          content: counter(page) " / " counter(pages);
          font-style: italic;
          font-size: 10pt;
        }
      }

      body {
        font-family: "NotoSans", sans-serif;
        font-size: 12pt;
        line-height: 1.35;
      }

      h1 {
        font-size: 24pt;
        margin: 0 0 1.2cm 0;
        string-set: doc-title content();
      }

      .segment {
        margin: 0 0 0.45cm 0;
        break-inside: avoid;
      }

      .speaker {
        font-weight: bold;
        margin: 0;
      }

      .timestamp {
        font-style: italic;
        margin: 0;
      }

      .text {
        margin: 0.05cm 0 0 0;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>{{ filename }}</h1>

    {% for segment in segments %}
      <section class="segment">
        {% if "speaker" in segment %}
          <p class="speaker">{{ segment.speaker }}:</p>
        {% endif %}
        {% if "timestamp" in segment %}
          <p class="timestamp">{{ segment.timestamp }}</p>
        {% endif %}
        <p class="text">{{ segment.text }}</p>
      </section>
    {% endfor %}
  </body>
</html>
